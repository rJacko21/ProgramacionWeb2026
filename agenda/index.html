<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agenda de Eventos</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="container">
        <header class="hero">
            <div>
                <h1>Agenda de Eventos</h1>
                <p>Gestiona tus actividades, filtra por fecha y exporta el plan diario en PDF.</p>
            </div>
        </header>

        <main>
            <section class="panel panel-form">
                <h2>Crear / Editar Evento</h2>
                <form id="evento-form">
                    <input type="hidden" id="evento-id">
                    <label for="titulo">Título</label>
                    <input type="text" id="titulo" placeholder="Nombre del evento" required>

                    <label for="fecha">Fecha</label>
                    <input type="date" id="fecha" required>

                    <label for="descripcion">Descripción</label>
                    <textarea id="descripcion" rows="4" placeholder="Descripción del evento" required></textarea>

                    <div class="form-actions">
                        <button type="submit" class="btn-primary">Guardar Evento</button>
                        <button type="button" id="cancelar-edicion" class="btn-secondary hidden">Cancelar</button>
                    </div>
                </form>
            </section>

            <section class="panel panel-filter">
                <h2>Filtrar Eventos</h2>
                <div class="range-grid">
                    <label>
                        Desde
                        <input type="date" id="filtro-desde">
                    </label>
                    <label>
                        Hasta
                        <input type="date" id="filtro-hasta">
                    </label>
                </div>
                <div class="panel-actions">
                    <button id="boton-filtrar" class="btn-primary">Aplicar Filtro</button>
                    <button id="boton-limpiar" class="btn-secondary">Limpiar</button>
                    <button id="boton-exportar" class="btn-export">Exportar Día</button>
                </div>
            </section>

            <section class="panel panel-list">
                <div class="list-header">
                    <h2>Eventos</h2>
                    <span id="eventos-count">0 eventos</span>
                </div>
                <div id="lista-eventos" class="lista-eventos"></div>
            </section>
        </main>
    </div>
    <script src="js/app.js"></script>
</body>
</html>
